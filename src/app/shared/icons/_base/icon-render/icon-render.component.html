@if (parsedIcon(); as parsed) {
  @if (parsed.isTemplateRef()) {
    <ng-container *ngTemplateOutlet="$any(parsed.icon)"></ng-container>
  } @else if (parsed.isImgSrc()) {
    <img
      width="100%"
      height="100%"
      [src]="parsed.icon"
      [alt]="(icon().icon_alt || '') | translate "
    />
  } @else if (parsed.isComponent()) {
    <div class="component-icon">
      <ng-container *ngComponentOutlet="$any(parsed.icon); inputs: componentIconInputs()"></ng-container>
    </div>
  }
}
